<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ERAM記録">
<title>ERAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@200;300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0A0A0A;
  --surface:#111;
  --border:#222;
  --mid:#444;
  --muted:#666;
  --text:#E8E8E8;
  --white:#F0F0F0;
  --accent:#E8E8E8;
}

body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:13px;
  font-weight:200;
  letter-spacing:0.03em;
}

/* header */
header{
  padding:24px 20px 0;
  position:sticky;
  top:0;
  z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding-bottom:0;
}
.brand{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;
  font-weight:300;
  letter-spacing:0.5em;
  text-transform:uppercase;
  color:var(--white);
  padding-bottom:16px;
}

nav{
  display:flex;
  border-top:1px solid var(--border);
  margin:0 -20px;
  padding:0 20px;
}
nav button{
  flex:1;
  padding:10px 0;
  background:none;
  border:none;
  color:var(--muted);
  font-family:'Noto Sans JP',sans-serif;
  font-size:10px;
  font-weight:200;
  letter-spacing:0.2em;
  text-transform:uppercase;
  cursor:pointer;
  position:relative;
  transition:color 0.2s;
}
nav button.active{color:var(--white)}
nav button.active::after{
  content:'';
  position:absolute;
  bottom:0;left:20%;right:20%;
  height:1px;
  background:var(--white);
}

.page{display:none;padding:28px 20px}
.page.active{display:block}

/* labels */
.lbl{
  font-size:9px;
  letter-spacing:0.35em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
  display:block;
}

/* pattern toggle */
.pat-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
  margin-bottom:28px;
}
.pat-btn{
  padding:16px 8px;
  background:var(--surface);
  border:none;
  color:var(--muted);
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
  font-weight:300;
  cursor:pointer;
  text-align:center;
  transition:all 0.15s;
}
.pat-btn .sub{
  display:block;
  font-family:'Noto Sans JP',sans-serif;
  font-size:9px;
  font-weight:200;
  letter-spacing:0.15em;
  color:var(--muted);
  margin-top:3px;
}
.pat-btn.active{
  background:var(--white);
  color:var(--bg);
}
.pat-btn.active .sub{color:var(--bg);opacity:0.6}

/* inputs */
.field{margin-bottom:20px}
input[type=text],input[type=date],textarea,select{
  width:100%;
  padding:11px 0;
  border:none;
  border-bottom:1px solid var(--border);
  background:transparent;
  font-family:'Noto Sans JP',sans-serif;
  font-size:14px;
  font-weight:200;
  color:var(--white);
  outline:none;
  -webkit-appearance:none;
  appearance:none;
  border-radius:0;
  transition:border-color 0.15s;
  letter-spacing:0.05em;
}
input:focus,textarea:focus,select:focus{border-bottom-color:var(--white)}
input::placeholder,textarea::placeholder{color:var(--muted)}
textarea{resize:none;height:56px}
select option{background:var(--bg);color:var(--white)}

/* photo */
.photo-zone{
  border:1px solid var(--border);
  padding:20px;
  text-align:center;
  margin-bottom:12px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:border-color 0.15s;
}
.photo-zone:active{border-color:var(--mid)}
.photo-zone .icon{font-size:20px;margin-bottom:4px}
.photo-zone .hint{font-size:10px;color:var(--muted);letter-spacing:0.1em}
.photo-zone input[type=file]{
  position:absolute;inset:0;opacity:0;cursor:pointer;
  width:100%;height:100%;border:none;padding:0
}
#preview-wrap{display:none;gap:6px;flex-wrap:wrap;margin-bottom:12px}
#preview-wrap img{height:56px;width:56px;object-fit:cover;border:1px solid var(--border)}

.ai-btn{
  width:100%;
  padding:10px;
  background:transparent;
  border:1px solid var(--mid);
  color:var(--muted);
  font-family:'Noto Sans JP',sans-serif;
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  cursor:pointer;
  margin-bottom:16px;
  display:none;
  transition:all 0.15s;
}
.ai-btn:active{border-color:var(--white);color:var(--white)}
.ai-result{
  font-size:11px;
  color:var(--muted);
  line-height:2;
  margin-bottom:20px;
  display:none;
  padding:12px 0;
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
}

/* scent rows */
.scent-row{
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid var(--border);
  margin-bottom:0;
}
.scent-row select{
  flex:1;
  border-bottom:none;
  padding:11px 0;
}
.rm-btn{
  background:none;
  border:none;
  color:var(--muted);
  font-size:18px;
  cursor:pointer;
  padding:0 4px;
  line-height:1;
  flex-shrink:0;
}
.add-btn{
  width:100%;
  padding:10px 0;
  background:none;
  border:none;
  color:var(--muted);
  font-size:11px;
  letter-spacing:0.2em;
  cursor:pointer;
  text-align:left;
  margin:8px 0 24px;
}

/* save */
.save-btn{
  width:100%;
  padding:14px;
  background:var(--white);
  color:var(--bg);
  border:none;
  font-family:'Cormorant Garamond',serif;
  font-size:15px;
  font-weight:400;
  letter-spacing:0.3em;
  text-transform:uppercase;
  cursor:pointer;
  transition:opacity 0.15s;
}
.save-btn:active{opacity:0.8}

.msg{
  text-align:center;
  padding:10px;
  font-size:11px;
  margin-top:10px;
  display:none;
  letter-spacing:0.1em;
  color:var(--muted);
}

/* list */
.filter-row{display:flex;gap:12px;margin-bottom:20px}
.filter-row input,.filter-row select{flex:1;font-size:12px}

.card{
  padding:16px 0;
  border-bottom:1px solid var(--border);
  position:relative;
}
.card-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:6px;
}
.card-date{font-size:10px;color:var(--muted);letter-spacing:0.1em}
.card-type{
  font-size:9px;
  color:var(--muted);
  letter-spacing:0.2em;
  text-transform:uppercase;
}
.card-name{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;
  font-weight:300;
  color:var(--white);
  margin-bottom:6px;
}
.card-scents{font-size:11px;color:var(--muted);line-height:2}
.card-memo{font-size:10px;color:var(--muted);margin-top:6px;font-style:italic}
.card-del{
  position:absolute;top:14px;right:0;
  background:none;border:none;
  color:var(--border);font-size:16px;
  cursor:pointer;padding:0;
  transition:color 0.15s;
}
.card-del:active{color:var(--muted)}
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
  font-size:11px;
  letter-spacing:0.2em;
  text-transform:uppercase;
}

.export-btn{
  width:100%;
  padding:11px;
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  cursor:pointer;
  margin-bottom:24px;
  transition:all 0.15s;
}
.export-btn:active{border-color:var(--white);color:var(--white)}

/* settings */
.stat-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
  margin-bottom:28px;
}
.stat-cell{
  background:var(--surface);
  padding:20px;
  text-align:center;
}
.stat-n{
  font-family:'Cormorant Garamond',serif;
  font-size:32px;
  font-weight:300;
  color:var(--white);
  display:block;
  line-height:1;
  margin-bottom:6px;
}
.stat-l{
  font-size:9px;
  color:var(--muted);
  letter-spacing:0.25em;
  text-transform:uppercase;
}

.key-row{display:flex;gap:8px;align-items:flex-end}
.key-row input{flex:1}
.key-save{
  padding:11px 14px;
  background:var(--white);
  color:var(--bg);
  border:none;
  font-size:10px;
  letter-spacing:0.15em;
  text-transform:uppercase;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
}

.danger{
  width:100%;
  padding:11px;
  background:none;
  border:1px solid var(--border);
  color:var(--muted);
  font-size:10px;
  letter-spacing:0.2em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all 0.15s;
}
.danger:active{border-color:#803030;color:#A05050}

.section-gap{margin-top:32px}
.hr{height:1px;background:var(--border);margin:24px 0}

.spinner{
  display:inline-block;
  width:12px;height:12px;
  border:1px solid rgba(255,255,255,0.2);
  border-top-color:var(--white);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  vertical-align:middle;
  margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="brand">ERAM</div>
  <nav>
    <button class="active" onclick="showPage('record',this)">Record</button>
    <button onclick="showPage('list',this)">History</button>
    <button onclick="showPage('settings',this)">Settings</button>
  </nav>
</header>

<!-- record -->
<div id="page-record" class="page active">

  <div class="pat-grid">
    <button class="pat-btn active" onclick="selectPat('mini',this)" id="pat-mini">
      Mini
      <span class="sub">5ml × 5</span>
    </button>
    <button class="pat-btn" onclick="selectPat('large',this)" id="pat-large">
      Large
      <span class="sub">30ml × 1</span>
    </button>
  </div>

  <div class="field">
    <span class="lbl">Date</span>
    <input type="date" id="rec-date">
  </div>

  <div class="field">
    <span class="lbl">Name</span>
    <input type="text" id="rec-name" placeholder="—">
  </div>

  <div class="hr"></div>

  <span class="lbl">Photo recognition</span>
  <div class="photo-zone">
    <div class="icon">↑</div>
    <div class="hint">Tap to select photos</div>
    <input type="file" accept="image/*" multiple id="photo-input" onchange="onPhoto(event)">
  </div>
  <div id="preview-wrap" style="display:flex"></div>
  <button class="ai-btn" id="ai-btn" onclick="runAI()">Recognize scent</button>
  <div class="ai-result" id="ai-result"></div>

  <!-- mini -->
  <div id="mini-area">
    <span class="lbl">Scents selected</span>
    <div id="scent-list"></div>
    <button class="add-btn" onclick="addScent()">+ add scent</button>
  </div>

  <!-- large -->
  <div id="large-area" style="display:none">
    <span class="lbl">Scent selected</span>
    <select id="large-sel"><option value="">—</option></select>
    <div style="margin-bottom:24px"></div>
  </div>

  <div class="field">
    <span class="lbl">Note</span>
    <textarea id="rec-memo" placeholder="—"></textarea>
  </div>

  <button class="save-btn" onclick="saveRec()">Save</button>
  <div class="msg" id="save-msg"></div>
</div>

<!-- list -->
<div id="page-list" class="page">
  <button class="export-btn" onclick="exportCSV()">Export CSV</button>
  <div class="filter-row">
    <input type="text" id="f-text" placeholder="search" oninput="renderList()">
    <select id="f-type" onchange="renderList()">
      <option value="">all</option>
      <option value="mini">mini</option>
      <option value="large">large</option>
    </select>
  </div>
  <div id="rec-list"></div>
</div>

<!-- settings -->
<div id="page-settings" class="page">
  <div class="stat-row">
    <div class="stat-cell">
      <span class="stat-n" id="st-total">0</span>
      <span class="stat-l">Records</span>
    </div>
    <div class="stat-cell">
      <span class="stat-n" id="st-people">0</span>
      <span class="stat-l">People</span>
    </div>
  </div>

  <span class="lbl">Gemini API Key</span>
  <div class="key-row">
    <input type="password" id="api-key" placeholder="AIza...">
    <button class="key-save" onclick="saveKey()">Save</button>
  </div>
  <div style="font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:0.05em">
    Google AI Studio — free tier available
  </div>

  <div class="hr section-gap"></div>
  <button class="danger" onclick="clearAll()">Delete all records</button>
  <div class="msg" id="set-msg"></div>
</div>

<script>
const SCENTS=[
  {name:'別人',num:'29',type:'Green Floral'},
  {name:'徒ら',num:'10',type:'Soft Floral'},
  {name:'暗転',num:'9',type:'Floral Oriental'},
  {name:'片隅',num:'7',type:'Green'},
  {name:'朝刊',num:'33',type:'Soft Oriental'},
  {name:'1830',num:'8',type:'Oriental'},
  {name:'めまい',num:'99',type:'Soft Oriental'},
  {name:'逡巡',num:'34',type:'Dry Woody'},
  {name:'正体',num:'3',type:'Fruity Oriental'},
  {name:'稜線',num:'5',type:'Fresh Woody'},
  {name:'記録',num:'84',type:'Dry Woody'},
  {name:'鼓動',num:'2',type:'Citrus'},
  {name:'束の間',num:'36',type:'Green Citrus'},
  {name:'独白',num:'92',type:'Aqua'},
  {name:'残響',num:'87',type:'Woody Green'},
  {name:'夢中',num:'50',type:'Fruity'},
  {name:'無関心',num:'93',type:'Fresh Floral'},
];

let pat='mini',photos=[],records=[],sc=0;

function scentOpts(){
  return '<option value="">—</option>'+SCENTS.map(s=>`<option value="${s.name}">${s.num}  ${s.name}  ${s.type}</option>`).join('');
}

function loadData(){
  try{records=JSON.parse(localStorage.getItem('eram_v2')||'[]')}catch(e){records=[]}
  const k=localStorage.getItem('eram_key')||'';
  const el=document.getElementById('api-key');
  if(el&&k)el.value=k;
}

window.addEventListener('DOMContentLoaded',()=>{
  loadData();
  setToday();
  document.getElementById('large-sel').innerHTML=scentOpts();
  for(let i=0;i<5;i++)addScent();
});

function setToday(){
  const t=new Date();
  document.getElementById('rec-date').value=
    `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
}

function showPage(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  if(name==='list')renderList();
  if(name==='settings')renderStats();
}

function selectPat(p){
  pat=p;
  document.querySelectorAll('.pat-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('pat-'+p).classList.add('active');
  document.getElementById('mini-area').style.display=p==='mini'?'block':'none';
  document.getElementById('large-area').style.display=p==='large'?'block':'none';
}

function addScent(){
  sc++;
  const id='s'+sc;
  const row=document.createElement('div');
  row.className='scent-row';row.id=id;
  row.innerHTML=`<select>${scentOpts()}</select><button class="rm-btn" onclick="removeRow('${id}')">×</button>`;
  document.getElementById('scent-list').appendChild(row);
}

function removeRow(id){const el=document.getElementById(id);if(el)el.remove()}

function onPhoto(e){
  photos=Array.from(e.target.files);
  const wrap=document.getElementById('preview-wrap');
  wrap.innerHTML='';
  wrap.style.display=photos.length?'flex':'none';
  photos.forEach(f=>{
    const img=document.createElement('img');
    img.src=URL.createObjectURL(f);
    wrap.appendChild(img);
  });
  document.getElementById('ai-btn').style.display=photos.length?'block':'none';
}

async function runAI(){
  const key=localStorage.getItem('eram_key');
  if(!key){alert('Settings画面でAPIキーを登録してください');return}
  if(!photos.length)return;
  const btn=document.getElementById('ai-btn');
  const res=document.getElementById('ai-result');
  btn.innerHTML='<span class="spinner"></span>Recognizing...';
  btn.disabled=true;
  try{
    const imgs=await Promise.all(photos.map(async f=>{
      const b64=await toB64(f);
      return{inlineData:{data:b64.split(',')[1],mimeType:f.type||'image/jpeg'}};
    }));
    const list=SCENTS.map(s=>`${s.num} ${s.name} (${s.type})`).join('\n');
    const prompt=`この写真はERAMというフレグランスブランドの香水ボトルです。写真に写っている香水の名前・番号を認識してください。\n\n【香りリスト】\n${list}\n\n写真に名前や日付がある場合も読み取ってください。ボトルサイズ（5mlミニ or 30ml大）も分かれば読み取ってください。\n\nJSON形式のみ（他テキスト不要）:\n{"name":"","date":"YYYY-MM-DD","scents":["香り名"],"bottle":"mini or large or empty","memo":""}`;
    const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:prompt},...imgs]}]})
    });
    if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API error')}
    const d=await r.json();
    const txt=d.candidates[0].content.parts[0].text.trim();
    let parsed;
    try{parsed=JSON.parse(txt.replace(/```json|```/g,'').trim())}
    catch(e){res.innerHTML=txt.replace(/\n/g,'<br>');res.style.display='block';return}
    if(parsed.name)document.getElementById('rec-name').value=parsed.name;
    if(parsed.date)document.getElementById('rec-date').value=parsed.date;
    if(parsed.memo)document.getElementById('rec-memo').value=parsed.memo;
    if(parsed.bottle==='large')selectPat('large');
    if(parsed.scents&&parsed.scents.length){
      if(pat==='mini'){
        const rows=document.getElementById('scent-list').querySelectorAll('.scent-row');
        parsed.scents.forEach((name,i)=>{
          if(i<rows.length){
            const sel=rows[i].querySelector('select');
            const m=SCENTS.find(s=>s.name===name||name.includes(s.name));
            if(m)sel.value=m.name;
          }
        });
      }else{
        const m=SCENTS.find(s=>s.name===parsed.scents[0]);
        if(m)document.getElementById('large-sel').value=m.name;
      }
    }
    let html='';
    if(parsed.name)html+=`Name: ${parsed.name}<br>`;
    if(parsed.scents)html+=`Scents: ${parsed.scents.join(' / ')}<br>`;
    if(parsed.bottle)html+=`Size: ${parsed.bottle}`;
    res.innerHTML=html||'No data recognized';
    res.style.display='block';
  }catch(e){alert('Error: '+e.message)}
  btn.innerHTML='Recognize scent';
  btn.disabled=false;
}

function toB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

function saveRec(){
  const date=document.getElementById('rec-date').value;
  const name=document.getElementById('rec-name').value.trim();
  if(!date){showMsg('save-msg','日付を入力してください');return}
  if(!name){showMsg('save-msg','名前を入力してください');return}
  let scents=[];
  if(pat==='mini'){
    document.getElementById('scent-list').querySelectorAll('.scent-row select').forEach(s=>{if(s.value)scents.push(s.value)});
  }else{
    const v=document.getElementById('large-sel').value;
    if(v)scents.push(v);
  }
  records.unshift({id:Date.now(),date,type:pat,name,scents,memo:document.getElementById('rec-memo').value.trim()});
  localStorage.setItem('eram_v2',JSON.stringify(records));
  showMsg('save-msg','Saved');
  resetForm();
}

function resetForm(){
  document.getElementById('rec-name').value='';
  document.getElementById('rec-memo').value='';
  document.getElementById('scent-list').innerHTML='';
  document.getElementById('large-sel').value='';
  document.getElementById('preview-wrap').innerHTML='';
  document.getElementById('preview-wrap').style.display='none';
  document.getElementById('ai-btn').style.display='none';
  document.getElementById('ai-result').style.display='none';
  document.getElementById('photo-input').value='';
  photos=[];sc=0;
  setToday();
  for(let i=0;i<5;i++)addScent();
}

function renderList(){
  const ft=(document.getElementById('f-text').value||'').toLowerCase();
  const ftype=document.getElementById('f-type').value;
  const filtered=records.filter(r=>{
    const tok=!ftype||r.type===ftype;
    const txt=!ft||r.name.toLowerCase().includes(ft)||r.scents.some(s=>s.toLowerCase().includes(ft));
    return tok&&txt;
  });
  const c=document.getElementById('rec-list');
  if(!filtered.length){c.innerHTML='<div class="empty">No records</div>';return}
  c.innerHTML=filtered.map(r=>`
    <div class="card">
      <button class="card-del" onclick="delRec(${r.id})">×</button>
      <div class="card-head">
        <span class="card-date">${r.date}</span>
        <span class="card-type">${r.type==='mini'?'5ml × 5':'30ml'}</span>
      </div>
      <div class="card-name">${r.name}</div>
      <div class="card-scents">${r.scents.map(s=>{const i=SCENTS.find(x=>x.name===s);return i?`${i.num}  ${s}`:s}).join('<br>')}</div>
      ${r.memo?`<div class="card-memo">${r.memo}</div>`:''}
    </div>
  `).join('');
}

function delRec(id){
  if(!confirm('削除しますか？'))return;
  records=records.filter(r=>r.id!==id);
  localStorage.setItem('eram_v2',JSON.stringify(records));
  renderList();
}

function exportCSV(){
  if(!records.length){alert('記録がありません');return}
  const max=Math.max(...records.map(r=>r.scents.length),1);
  const hdr='日付,タイプ,名前,'+Array.from({length:max},(_,i)=>`香り${i+1}`).join(',')+',メモ';
  const rows=records.map(r=>{
    const sc=Array.from({length:max},(_,i)=>r.scents[i]?`"${r.scents[i]}"`:'"—"').join(',');
    return`${r.date},${r.type==='mini'?'mini 5ml×5':'large 30ml'},"${r.name}",${sc},"${r.memo||''}"`;
  });
  const csv='\uFEFF'+hdr+'\n'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`eram_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},100);
}

function saveKey(){
  const k=document.getElementById('api-key').value.trim();
  if(!k){alert('APIキーを入力してください');return}
  localStorage.setItem('eram_key',k);
  showMsg('set-msg','Saved');
}

function renderStats(){
  document.getElementById('st-total').textContent=records.length;
  document.getElementById('st-people').textContent=new Set(records.map(r=>r.name)).size;
}

function clearAll(){
  if(!confirm('すべて削除しますか？'))return;
  records=[];
  localStorage.setItem('eram_v2','[]');
  renderStats();
  showMsg('set-msg','Deleted');
}

function showMsg(id,txt){
  const el=document.getElementById(id);
  el.textContent=txt;el.style.display='block';
  setTimeout(()=>el.style.display='none',2500);
}
</script>
</body>
</html>
